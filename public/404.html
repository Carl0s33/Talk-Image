<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var l = window.location;
        var segments = l.pathname.split('/').filter(Boolean);
        var base = segments.length ? '/' + segments[0] + '/' : '/';

        // Path relative ao base (sempre começando com '/').
        var relativePath = l.pathname;
        if (base !== '/' && relativePath.startsWith(base)) {
          relativePath = relativePath.slice(base.length - 1);
        }

        // Redireciona para o index com query (evita 404 em deep-links)
        // e embute o destino completo (path + search + hash) em um único parâmetro.
        var destination = relativePath + (l.search || '') + (l.hash || '');
        var redirectUrl = base + '?redirect=' + encodeURIComponent(destination);
        l.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
